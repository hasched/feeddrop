<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeedDrop</title>
  <meta name="description" content="The best TikTok videos, curated daily." />
  <meta property="og:title" content="FeedDrop" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <header>
    <div class="logo-wrap">
      <h1 class="logo">FeedDrop</h1>
      <span class="tagline">@myfeeddrop</span>
    </div>
    <div class="nav-buttons">
      <!-- <a href="index.html" class="nav-btn active">TikTok</a> -->
      <!-- <a href="youtube.html" class="nav-btn">YouTube</a> -->
    </div>
  </header>

  <div class="rule" aria-hidden="true"></div>

  <!-- ── FILTER + SEARCH BAR ── -->
  <div class="filter-bar">
    <div class="filter-top-row">
      <button class="filter-toggle" id="filterToggle" aria-expanded="false" aria-controls="filterPanel">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        <span>Filter</span>
        <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by name, tag (food, music, sports…)" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <div class="filter-panel" id="filterPanel" aria-hidden="true">
      <div class="filter-group">
        <div class="filter-chips">
          <button class="chip active" data-filter="tag" data-value="all">All</button>
          <button class="chip" data-filter="tag" data-value="male">Male</button>
          <button class="chip" data-filter="tag" data-value="female">Female</button>
          <button class="chip" data-filter="tag" data-value="podcast">Podcast</button>
          <button class="chip" data-filter="tag" data-value="art">Art</button>
          <button class="chip" data-filter="tag" data-value="food">Food</button>
          <button class="chip" data-filter="tag" data-value="sports">Sports</button>
          <button class="chip" data-filter="tag" data-value="vlogs">Vlogs</button>
          <button class="chip" data-filter="tag" data-value="news">News</button>
          <button class="chip" data-filter="tag" data-value="music">Music</button>
          <button class="chip" data-filter="tag" data-value="streamer">Streamer</button>
          <button class="chip" data-filter="tag" data-value="trending">Trending 🔥</button>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-status" id="filterStatus"></div>

  <!-- Feed — populated by app.js -->
  <main class="feed" id="feed"></main>

  <!-- Pagination controls — populated by app.js -->
  <div id="pagination" class="pagination"></div>

  <div class="empty-state" id="emptyState">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    <p>No creators match this filter.</p>
    <button class="reset-btn" onclick="resetFilters()">Clear filters</button>
  </div>

  <footer>FeedDrop &mdash; &copy; 2026</footer>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>
