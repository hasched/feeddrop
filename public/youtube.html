<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeedDrop | YouTube</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <header>
    <div class="logo-wrap">
      <h1 class="logo">FeedDrop</h1>
      <span class="tagline">Abuzar Moradi</span>
    </div>
    <div class="nav-buttons">
      <a href="index.html" class="nav-btn">TikTok Feed</a>
      <a href="youtube.html" class="nav-btn active">YouTube Feed</a>
    </div>
  </header>

  <div class="rule" aria-hidden="true"></div>

  <main class="feed yt-grid" id="feed">

    <article class="card yt-card" data-tags="travel">
      <div class="video-wrap yt-wrap">
        <iframe 
          src="https://www.youtube.com/embed/ZjQ2NliowK4" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
          allowfullscreen>
        </iframe>
      </div>
      <div class="card-meta">
        <span class="video-title">The Most Amazing Places to Visit in Switzerland</span>
        <a class="handle" href="https://www.youtube.com/@TheTravelVlogger" target="_blank" rel="noopener">@TheTravelVlogger</a>
      </div>
    </article>

    </main>

  <footer>&copy; 2026 FeedDrop</footer>

</body>
</html>
